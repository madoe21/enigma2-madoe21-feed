name: ci
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext fakeroot binutils
      - name: Build IPK (build-only, no tag/release)
        run: make ipk
